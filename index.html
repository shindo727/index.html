<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyMove – Sharm El Sheikh Transfers</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-dark:  #0f2f6b;
    --gold:       #c9a43a;
    --gold-light: #e8c45a;
    --white:      #ffffff;
    --muted:      #7a90b8;
    --card:       #1c3e82;
    --border:     rgba(201,164,58,0.25);
    --gold-grad:  linear-gradient(135deg,#c9a43a,#e8c45a);
    --radius:     14px;
    --ease:       0.22s cubic-bezier(0.4,0,0.2,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--blue-dark);color:var(--white);font-family:"DM Sans",sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -5%,rgba(201,164,58,.12) 0%,transparent 65%),radial-gradient(ellipse 50% 40% at 90% 100%,rgba(37,99,192,.15) 0%,transparent 60%);pointer-events:none;z-index:0}
  .page{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 0 60px}

  /* LANG BAR */
  .lang-bar{display:flex;justify-content:flex-end;padding:12px 16px 0;animation:fadeUp .4s ease both}
  .lang-btn{display:flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(255,255,255,.08);border:1.5px solid rgba(201,164,58,.3);border-radius:30px;cursor:pointer;color:var(--white);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;letter-spacing:.5px;transition:all var(--ease)}
  .lang-btn:hover{background:rgba(201,164,58,.15);border-color:var(--gold)}
  .lang-btn .flag{font-size:18px}
  .lang-btn .lbl{color:var(--gold-light)}

  /* LOGO */
  .header{text-align:center;padding:16px 24px 0;animation:fadeUp .5s .05s ease both}
  .logo-img{width:200px;height:auto;background:#fff;border-radius:16px;padding:14px 20px;box-shadow:0 0 0 1px rgba(201,164,58,.3),0 8px 32px rgba(0,0,0,.35)}

  /* BADGE */
  .vehicle-badge{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 20px;margin:18px 16px 0;background:linear-gradient(135deg,rgba(201,164,58,.15),rgba(37,99,192,.15));border:1px solid var(--border);border-radius:12px;animation:fadeUp .5s .1s ease both}
  .vb-text{font-size:12px;font-weight:600;color:var(--gold-light);letter-spacing:1px;text-transform:uppercase}
  .dot{width:4px;height:4px;border-radius:50%;background:rgba(201,164,58,.5);flex-shrink:0}

  /* CARD */
  .booking-card{margin:14px 16px 0;background:var(--card);border-radius:20px;border:1px solid var(--border);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .5s .15s ease both}
  .section{padding:18px 20px;border-bottom:1px solid rgba(201,164,58,.15)}
  .section:last-child{border-bottom:none}
  .section-title{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}

  /* OPT BUTTONS */
  .btn-group{display:flex;flex-direction:column;gap:10px}
  .opt-btn{width:100%;padding:14px 18px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--radius);color:var(--white);font-family:"DM Sans",sans-serif;font-size:15px;font-weight:500;text-align:left;cursor:pointer;transition:all var(--ease);position:relative;overflow:hidden;display:flex;align-items:center;gap:12px}
  .opt-btn::before{content:"";position:absolute;inset:0;background:var(--gold-grad);opacity:0;transition:opacity var(--ease)}
  .opt-btn .btn-text{position:relative;z-index:1;flex:1}
  .opt-btn .chk{position:relative;z-index:1;margin-left:auto;width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--ease)}
  .opt-btn .chk svg{width:11px;height:11px;opacity:0;transition:opacity var(--ease)}
  .opt-btn:hover:not(.selected){border-color:rgba(201,164,58,.5);background:rgba(201,164,58,.07);transform:translateX(3px)}
  .opt-btn.selected{border-color:transparent;color:#0f2030;font-weight:600;transform:translateX(3px);box-shadow:0 6px 20px rgba(201,164,58,.35)}
  .opt-btn.selected::before{opacity:1}
  .opt-btn.selected .btn-text{color:#0f2030}
  .opt-btn.selected .chk{border-color:rgba(15,32,48,.4);background:rgba(15,32,48,.2)}
  .opt-btn.selected .chk svg{opacity:1}

  /* PRICE SECTION */
  .price-section{margin:14px 16px 0;padding:18px 22px;background:linear-gradient(135deg,var(--blue-dark),#142d6a);border-radius:20px;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:fadeUp .5s .2s ease both}
  .price-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:4px}
  .price-amount{font-family:"Playfair Display",serif;font-size:30px;font-weight:700;color:var(--gold-light);line-height:1;margin-bottom:4px}
  .price-sub{font-size:12px;color:var(--muted)}
  .price-badge{background:rgba(201,164,58,.12);border:1px solid rgba(201,164,58,.3);border-radius:12px;padding:12px 16px;text-align:center}
  .pb-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .pb-val{font-size:13px;font-weight:600;color:var(--gold-light);margin-top:3px}

  /* CTA */
  .cta-wrap{margin:14px 16px 0;animation:fadeUp .5s .25s ease both}
  .cta-btn{width:100%;padding:18px;background:var(--gold-grad);border:none;border-radius:16px;color:#0f2030;font-family:"DM Sans",sans-serif;font-size:17px;font-weight:700;cursor:pointer;transition:all var(--ease);box-shadow:0 8px 30px rgba(201,164,58,.4)}
  .cta-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(201,164,58,.55)}
  .cta-btn:active{transform:translateY(0)}
  .cta-hint{text-align:center;font-size:12px;color:var(--muted);margin-top:10px}

  /* ERROR */
  .error-msg{display:none;margin:10px 16px 0;padding:12px 16px;background:rgba(220,50,50,.1);border:1px solid rgba(220,50,50,.3);border-radius:10px;font-size:13px;color:#ff9a9a;text-align:center}
  .error-msg.show{display:block}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(5,15,40,.88);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s ease}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{width:100%;max-width:480px;margin:0 auto;background:#132458;border-radius:24px 24px 0 0;border-top:1px solid var(--border);padding:0 0 40px;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-handle{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:14px auto 0}
  .modal-header{padding:18px 24px 0;display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-family:"Playfair Display",serif;font-size:21px;font-weight:700;color:var(--white)}
  .modal-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:var(--white);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--ease)}
  .modal-close:hover{background:rgba(255,255,255,.16)}

  /* ROUTE PILL */
  .route-pill{margin:16px 24px 0;padding:14px 18px;background:linear-gradient(135deg,rgba(201,164,58,.12),rgba(37,99,192,.12));border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .rp-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:500;flex-basis:100%;margin-bottom:4px}
  .rp-from,.rp-to{font-weight:600;font-size:14px;color:var(--white)}
  .rp-arrow{color:var(--gold-light);font-size:14px;flex-grow:1;text-align:center}
  .rp-time{background:rgba(201,164,58,.2);border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;color:var(--gold-light);margin-left:auto}

  /* FORM */
  .form-body{padding:16px 24px 0;display:flex;flex-direction:column;gap:14px}
  .field-group{display:flex;flex-direction:column;gap:6px}
  .field-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:600}
  .field-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--radius);color:var(--white);font-family:"DM Sans",sans-serif;font-size:15px;transition:border-color var(--ease),background var(--ease);outline:none;-webkit-appearance:none}
  .field-input::placeholder{color:rgba(255,255,255,.25)}
  .field-input:focus{border-color:var(--gold);background:rgba(201,164,58,.06)}

  /* VEHICLE TOGGLE */
  .vehicle-toggle{display:flex;gap:10px}
  .vt-btn{flex:1;padding:14px 10px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--radius);color:var(--white);font-family:"DM Sans",sans-serif;cursor:pointer;text-align:center;transition:all var(--ease);position:relative;overflow:hidden}
  .vt-btn::before{content:"";position:absolute;inset:0;background:var(--gold-grad);opacity:0;transition:opacity var(--ease)}
  .vt-btn > *{position:relative;z-index:1;display:block}
  .vt-icon{font-size:22px;margin-bottom:4px}
  .vt-name{font-size:14px;font-weight:700}
  .vt-price{font-size:11px;opacity:.8;margin-top:2px}
  .vt-btn:hover:not(.selected){border-color:rgba(201,164,58,.5);background:rgba(201,164,58,.07)}
  .vt-btn.selected{border-color:transparent;color:#0f2030;box-shadow:0 6px 20px rgba(201,164,58,.35)}
  .vt-btn.selected::before{opacity:1}

  /* PRIVATE NOTE */
  .private-note{display:none;margin-top:10px;padding:10px 14px;background:rgba(201,164,58,.1);border:1px solid rgba(201,164,58,.3);border-radius:10px;font-size:12px;color:var(--gold-light);line-height:1.5}
  .private-note.show{display:block}

  /* COUNTER */
  .people-counter{display:flex;align-items:center;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--radius);overflow:hidden}
  .counter-btn{width:52px;height:52px;background:rgba(255,255,255,.05);border:none;color:var(--gold-light);font-size:22px;font-weight:300;cursor:pointer;transition:background var(--ease);flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .counter-btn:hover{background:rgba(201,164,58,.15)}
  .counter-btn:active{background:rgba(201,164,58,.25)}
  .counter-display{flex:1;text-align:center}
  .counter-num{font-family:"Playfair Display",serif;font-size:22px;font-weight:700;color:var(--white);display:block;line-height:1}
  .counter-lbl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}

  /* DYNAMIC PRICE */
  .dynamic-price{background:linear-gradient(135deg,rgba(201,164,58,.1),rgba(37,99,192,.1));border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
  .dp-label{font-size:12px;color:var(--muted)}
  .dp-total{font-family:"Playfair Display",serif;font-size:26px;font-weight:700;color:var(--gold-light);transition:transform .2s ease}
  .dp-note{font-size:11px;color:var(--muted);margin-top:2px}

  /* SUBMIT */
  .submit-btn{width:100%;padding:17px;margin-top:4px;background:var(--gold-grad);border:none;border-radius:14px;color:#0f2030;font-family:"DM Sans",sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 24px rgba(201,164,58,.35);transition:all var(--ease)}
  .submit-btn:hover{transform:translateY(-1px);box-shadow:0 10px 30px rgba(201,164,58,.45)}
  .submit-btn svg{width:18px;height:18px;fill:#0f2030;flex-shrink:0}

  /* SUCCESS */
  .success-screen{display:none;padding:32px 24px 20px;text-align:center;flex-direction:column;align-items:center;gap:12px}
  .success-screen.show{display:flex}
  .success-icon{width:70px;height:70px;background:var(--gold-grad);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 12px rgba(201,164,58,.12);margin-bottom:8px}
  .success-icon svg{width:34px;height:34px;fill:#0f2030}
  .success-title{font-family:"Playfair Display",serif;font-size:24px;font-weight:700;color:var(--white)}
  .success-sub{font-size:14px;color:var(--muted);line-height:1.6}
  .success-detail{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:16px 20px;width:100%;text-align:left;margin-top:8px}
  .sd-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .sd-row:last-child{margin-bottom:0}
  .sd-key{font-size:12px;color:var(--muted)}
  .sd-val{font-size:13px;font-weight:600;color:var(--white);text-align:right}
  .whatsapp-btn{width:100%;padding:16px;background:#25D366;border:none;border-radius:14px;color:#fff;font-family:"DM Sans",sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 20px rgba(37,211,102,.3);transition:all var(--ease);text-decoration:none;margin-top:8px}
  .whatsapp-btn:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(37,211,102,.4)}
  .whatsapp-btn svg{width:22px;height:22px;fill:white}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
